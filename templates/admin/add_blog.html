{% extends "admin/base.html" %}

{% block title %}
Publish Blog
{% endblock %}

{% block page_title %}
Publish Blog
{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h2>Publish New Blog</h2>

        <p>
            Share updates, impact stories and news with your supporters.
        </p>

    </div>

    <div>

        <a href="{{ url_for('manage_blogs') }}"
           class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left me-2"></i>

            Back

        </a>

    </div>

</div>


<div class="admin-card mb-4">

    <h5 class="mb-3">

        <i class="fa-solid fa-user-pen me-2 text-primary"></i>

        Author Information

    </h5>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Name

            </label>

            <input
                type="text"
                class="form-control"
                value="{{ session['name'] }}"
                readonly>

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">

                Email

            </label>

            <input
                type="email"
                class="form-control"
                value="{{ session['email'] }}"
                readonly>

        </div>

    </div>

</div>


<div class="admin-card">

    <form method="POST">

        <div class="row">

            <div class="col-12 mb-3">

                <label class="form-label">

                    Blog Title

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    placeholder="Enter blog title..."
                    required>

            </div>

            <div class="col-12 mb-4">

                <label class="form-label">

                    Blog Content

                </label>

                <textarea
                    name="content"
                    rows="14"
                    class="form-control"
                    placeholder="Write your article here..."
                    required></textarea>

            </div>

        </div>

        <hr>

        <div class="d-flex justify-content-end gap-2">

            <a href="{{ url_for('manage_blogs') }}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button
                type="submit"
                class="btn btn-success">

                <i class="fa-solid fa-paper-plane me-2"></i>

                Publish Blog

            </button>

        </div>

    </form>

</div>

{% endblock %}
