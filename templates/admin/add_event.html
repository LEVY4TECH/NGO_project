{% extends "admin/base.html" %}

{% block title %}
Add Event
{% endblock %}

{% block page_title %}
Add Event
{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h2>Add New Event</h2>

        <p>
            Create a new event for one of your fundraising campaigns.
        </p>

    </div>

    <div>

        <a href="{{ url_for('manage_events') }}"
           class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left me-2"></i>

            Back

        </a>

    </div>

</div>

<div class="admin-card">

    <form method="POST">

        <div class="row">

            <!-- Campaign -->

            <div class="col-md-12 mb-3">

                <label class="form-label">

                    Campaign

                </label>

                <select
                    name="campaign_id"
                    class="form-select"
                    required>

                    <option value="">
                        -- Select Campaign --
                    </option>

                    {% for campaign in campaigns %}

                    <option value="{{ campaign[0] }}">

                        {{ campaign[1] }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- Event Title -->

            <div class="col-md-12 mb-3">

                <label class="form-label">

                    Event Title

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    placeholder="Enter event title"
                    required>

            </div>

            <!-- Description -->

            <div class="col-md-12 mb-3">

                <label class="form-label">

                    Description

                </label>

                <textarea
                    name="description"
                    rows="6"
                    class="form-control"
                    placeholder="Write event description..."
                    required></textarea>

            </div>

            <!-- Event Date -->

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Event Date

                </label>

                <input
                    type="date"
                    name="event_date"
                    class="form-control"
                    required>

            </div>

            <!-- Location -->

            <div class="col-md-6 mb-4">

                <label class="form-label">

                    Location

                </label>

                <input
                    type="text"
                    name="location"
                    class="form-control"
                    placeholder="e.g. Nairobi, Kenya"
                    required>

            </div>

        </div>

        <hr>

        <div class="d-flex justify-content-end gap-2">

            <a href="{{ url_for('manage_events') }}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button
                type="submit"
                class="btn btn-success">

                <i class="fa-solid fa-calendar-plus me-2"></i>

                Create Event

            </button>

        </div>

    </form>

</div>

{% endblock %}

{% block scripts %}

<script>

// Prevent selecting a past date

const eventDate = document.querySelector('input[name="event_date"]');

eventDate.min = new Date().toISOString().split("T")[0];

</script>

{% endblock %}
