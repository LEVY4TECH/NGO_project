<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — HopeForward</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
            padding: 2rem 1rem;
            /* side padding on small screens */
        }

        /* The form card itself */
        .auth-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 460px;
            /* never wider than 460px */
            box-shadow: var(--shadow);
        }

        /* Brand name link at the top of each auth card */
        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        /* Main heading — "Create an Account" / "Welcome Back" */
        .auth-card h2 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }

        /* Supporting subtitle under the heading */
        .auth-card .auth-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
    </style>
</head>

<body class="auth-page">

    <div class="auth-card">
        <div class="text-center mb-3">
            <a href="index.html" class="auth-logo d-inline-block">
                <i class="fa-solid fa-heart-pulse me-2"></i>HopeForward
            </a>
        </div>
        <h2 class="text-center">Welcome Back</h2>
        <p class="auth-sub text-center">Sign in to your account to continue.</p>

        <div id="loginAlert" class="mb-3"></div>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label" for="loginEmail">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" id="loginEmail" placeholder="jane@email.com" required />
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label" for="loginPassword">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Your password"
                        required />
                    <button type="button" class="btn border-0" id="toggleLoginPw"
                        style="background:var(--navy-light);border:1px solid rgba(201,168,76,.2)!important;color:var(--text-muted);">
                        <i class="fa-solid fa-eye" id="loginEyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-2">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>

        <hr class="divider-gold mt-4" />
        <p class="text-center mb-0" style="font-size:.9rem;">
            Don't have an account? <a href="register.html" class="text-gold fw-semibold">Register here</a>
        </p>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.getElementById('toggleLoginPw').addEventListener('click', () => {
            const pw = document.getElementById('loginPassword');
            const icon = document.getElementById('loginEyeIcon');
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'fa-solid fa-eye'; }
        });

        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) return showAlert('Please fill in all fields.', 'danger');

            const user = HF.getUserByEmail(email);
            if (!user || user.passwordHash !== HF.hashPassword(password)) {
                return showAlert('Invalid email or password.', 'danger');
            }

            HF.setCurrentUser(user);

            showAlert(
                `<i class="fa-solid fa-circle-check me-2"></i>Welcome back, ${user.name}! Redirecting…`,
                'success'
            );

            setTimeout(() => {
                window.location.href = (user.role === 'admin' || user.role === 'intern')
                    ? 'admin/index.html'
                    : 'index.html';
            }, 1300);
        });

        function showAlert(msg, type) {
            document.getElementById('loginAlert').innerHTML = `<div class="alert-hf alert-hf-${type}">${msg}</div>`;
        }
    </script>
</body>

</html>
