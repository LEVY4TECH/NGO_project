<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events — HopeForward</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />

    <style>
        .event-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201, 168, 76, 0.12);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
            transition: all var(--transition);
        }

        .event-card:hover {
            border-color: var(--gold-dim);
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        /* Left-side date block — shows abbreviated month above the day number */
        .event-date-badge {
            min-width: 60px;
            text-align: center;
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 10px;
            padding: 0.6rem 0.4rem;
        }

        /* Month text — e.g. "JAN" */
        .event-date-badge .month {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold);
            font-weight: 700;
        }

        /* Day number — e.g. "14" in large serif */
        .event-date-badge .day {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--white);
            line-height: 1;
        }

        /* Right-side text content area */
        .event-info h6 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .event-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* Location pill tag below the event description */
        .event-meta-tag {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(26, 107, 90, 0.2);
            /* teal tint */
            color: var(--teal-light);
            border: 1px solid rgba(26, 107, 90, 0.3);
            border-radius: 50px;
            padding: 0.15rem 0.6rem;
            margin-top: 0.4rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-hopeforward">
        <div class="container">
            <a class="navbar-brand navbar-brand-hf" href="index.html">
                <i class="fa-solid fa-heart-pulse me-2"></i>Hope<span>Forward</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="campaigns.html">Campaigns</a></li>
                    <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                </ul>
                <div class="d-flex align-items-center gap-1" id="navbar-auth"></div>
            </div>
        </div>
    </nav>

    <div class="page-header-banner">
        <div class="container">
            <span class="section-eyebrow">Get Involved</span>
            <h1>Upcoming Events</h1>
            <p>From fundraising galas to community clean-ups — find an event near you and show up for what matters.</p>
        </div>
    </div>

    <section class="section-pad">
        <div class="container">
            <div class="row g-4" id="eventsList"></div>
            <div id="eventsEmpty" style="display:none;" class="text-center py-5">
                <div style="font-size:3rem;margin-bottom:1rem;color:var(--text-muted);">🗓️</div>
                <h5>No Events Scheduled</h5>
                <p class="text-muted">Stay tuned — exciting events are being planned!</p>
            </div>
        </div>
    </section>

    <footer class="footer-hf">
        <div class="container">
            <div class="footer-bottom">&copy; <span id="footerYear"></span> HopeForward Charity Foundation.</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        const tagColors = ['var(--teal-light)', 'var(--gold)', '#6BA0E0', '#E57B70', '#A78BFA'];

        function render() {
            const events = HF.getEvents();
            const list = document.getElementById('eventsList');
            const empty = document.getElementById('eventsEmpty');
            if (!events.length) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            list.innerHTML = events.map((ev, i) => {
                const d = new Date(ev.eventDate);
                const month = isNaN(d) ? '—' : d.toLocaleString('default', { month: 'short' }).toUpperCase();
                const day = isNaN(d) ? '—' : d.getDate();
                const tagColor = tagColors[i % tagColors.length];
                return `
        <div class="col-lg-6 reveal">
          <div class="event-card" style="padding:1.8rem;">
            <div class="event-date-badge" style="min-width:70px;">
              <div class="month">${month}</div>
              <div class="day">${day}</div>
              <div style="font-size:.6rem;color:var(--text-muted);">${isNaN(d) ? '' : d.getFullYear()}</div>
            </div>
            <div class="event-info flex-grow-1">
              <h5 style="font-size:1.1rem;">${escHtml(ev.title)}</h5>
              <p style="font-size:.9rem;">${escHtml(ev.description)}</p>
              <div class="d-flex flex-wrap gap-2 mt-2">
                <span style="font-size:.75rem;color:${tagColor};background:${tagColor}22;border:1px solid ${tagColor}44;border-radius:50px;padding:.2rem .7rem;">
                  <i class="fa-solid fa-location-dot me-1"></i>${escHtml(ev.location || 'TBA')}
                </span>
                <span style="font-size:.75rem;color:var(--text-muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:50px;padding:.2rem .7rem;">
                  <i class="fa-solid fa-user-pen me-1"></i>${escHtml(ev.adminEmail || '')}
                </span>
              </div>
            </div>
          </div>
        </div>`;
            }).join('');
        }

        render();

        function escHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
    </script>
</body>

</html>
