<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — HopeForward</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
            padding: 2rem 1rem;
            /* side padding on small screens */
        }

        /* The form card itself */
        .auth-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 460px;
            /* never wider than 460px */
            box-shadow: var(--shadow);
        }

        /* Brand name link at the top of each auth card */
        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        /* Main heading — "Create an Account" / "Welcome Back" */
        .auth-card h2 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }

        /* Supporting subtitle under the heading */
        .auth-card .auth-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
    </style>
</head>

<body class="auth-page">

    <div class="auth-card">
        <!-- Brand -->
        <div class="text-center mb-3">
            <a href="{{ url_for('home') }}" class="auth-logo d-inline-block">
                <i class="fa-solid fa-heart-pulse me-2"></i>HopeForward
            </a>
        </div>
        <h2 class="text-center">Create an Account</h2>
        <p class="auth-sub text-center">Join our community and help make a difference.</p>

        <!-- Flash Messages configuration -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert-hf alert-hf-{{ category }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}



        <!-- Register Form -->
        <form action="{{ url_for('register') }}" method="POST">

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label" for="regName">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" name="name" id="regName" placeholder="Jane Doe" required />
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label" for="regEmail">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" name="email" id="regEmail" placeholder="jane@email.com"
                        required />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="regPassword">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" minlength="6" id="regPassword"
                        placeholder="At least 6 characters" required />
                    <button type="button" class="btn btn-outline-secondary border-0" id="togglePw"
                        style="background:var(--navy-light);border:1px solid rgba(201,168,76,.2)!important;color:var(--text-muted);">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label" for="regConfirm">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock-open"></i></span>
                    <input type="password" class="form-control" name="cpassword" id="regConfirm"
                        placeholder="Repeat your password" required />
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-2">
                <i class="fa-solid fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="divider-gold mt-4" />
        <p class="text-center mb-0" style="font-size:.9rem;">
            Already have an account? <a href="{{ url_for('login') }}" class="text-gold fw-semibold">Sign In</a>
        </p>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* Toggle password visibility */
        document.getElementById('togglePw').addEventListener('click', () => {
            const pw = document.getElementById('regPassword');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                pw.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        });


    </script>
</body>

</html>
