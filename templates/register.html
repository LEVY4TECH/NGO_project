<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — HopeForward</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
            padding: 2rem 1rem;
            /* side padding on small screens */
        }

        /* The form card itself */
        .auth-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 460px;
            /* never wider than 460px */
            box-shadow: var(--shadow);
        }

        /* Brand name link at the top of each auth card */
        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        /* Main heading — "Create an Account" / "Welcome Back" */
        .auth-card h2 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }

        /* Supporting subtitle under the heading */
        .auth-card .auth-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }
    </style>
</head>

<body class="auth-page">

    <div class="auth-card">
        <!-- Brand -->
        <div class="text-center mb-3">
            <a href="index.html" class="auth-logo d-inline-block">
                <i class="fa-solid fa-heart-pulse me-2"></i>HopeForward
            </a>
        </div>
        <h2 class="text-center">Create an Account</h2>
        <p class="auth-sub text-center">Join our community and help make a difference.</p>

        <!-- Alert area -->
        <div id="registerAlert" class="mb-3"></div>

        <!-- Register Form -->
        <form id="registerForm" novalidate>

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label" for="regName">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="regName" placeholder="Jane Doe" required />
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label" for="regEmail">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" id="regEmail" placeholder="jane@email.com" required />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="regPassword">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="regPassword" placeholder="At least 6 characters"
                        required />
                    <button type="button" class="btn btn-outline-secondary border-0" id="togglePw"
                        style="background:var(--navy-light);border:1px solid rgba(201,168,76,.2)!important;color:var(--text-muted);">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="form-label" for="regConfirm">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock-open"></i></span>
                    <input type="password" class="form-control" id="regConfirm" placeholder="Repeat your password"
                        required />
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-2">
                <i class="fa-solid fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="divider-gold mt-4" />
        <p class="text-center mb-0" style="font-size:.9rem;">
            Already have an account? <a href="login.html" class="text-gold fw-semibold">Sign In</a>
        </p>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script>
        /* Toggle password visibility */
        document.getElementById('togglePw').addEventListener('click', () => {
            const pw = document.getElementById('regPassword');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                pw.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        });

        /* Register form submission */
        document.getElementById('registerForm').addEventListener('submit', e => {
            e.preventDefault();
            const alertEl = document.getElementById('registerAlert');
            alertEl.innerHTML = '';

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            /* Validations */
            if (!name || !email || !password || !confirm) {
                return showAlert('Please fill in all fields.', 'danger');
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                return showAlert('Please enter a valid email address.', 'danger');
            }
            if (password.length < 6) {
                return showAlert('Password must be at least 6 characters.', 'danger');
            }
            if (password !== confirm) {
                return showAlert('Passwords do not match.', 'danger');
            }
            if (HF.getUserByEmail(email)) {
                return showAlert('An account with that email already exists.', 'danger');
            }

            /* Determine role: first registered user = admin; rest = user */
            const users = HF.getUsers();
            const role = users.length === 0 ? 'admin' : 'user';

            HF.addUser({
                name,
                email,
                passwordHash: HF.hashPassword(password),
                role,
                joinedAt: new Date().toISOString()
            });

            showAlert(
                `<i class="fa-solid fa-circle-check me-2"></i>Account created successfully! Redirecting to login…`,
                'success'
            );

            /* Redirect to login after 1.6s */
            setTimeout(() => { window.location.href = 'login.html'; }, 1700);
        });

        function showAlert(msg, type) {
            const alertEl = document.getElementById('registerAlert');
            alertEl.innerHTML = `<div class="alert-hf alert-hf-${type}">${msg}</div>`;
        }
    </script>
</body>

</html>
