<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — HopeForward</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .blog-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201, 168, 76, 0.12);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            border-color: var(--gold-dim);
            transform: translateY(-4px);
            box-shadow: var(--shadow-gold);
        }

        /* Decorative top area with a large emoji icon — no real image needed */
        .blog-card-img-placeholder {
            height: 180px;
            background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            /* emoji size */
            color: var(--gold-dim);
            border-bottom: 1px solid rgba(201, 168, 76, 0.1);
        }

        /* Card body — grows to fill space, pushing footer to bottom */
        .blog-card-body {
            padding: 1.4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Small category label above the title — e.g. "Foundation Update" */
        .blog-category-tag {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        /* Post title */
        .blog-card-body h5 {
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }

        /* Post excerpt / preview text */
        .blog-card-body p {
            color: var(--text-muted);
            font-size: 0.88rem;
            flex: 1;
        }

        /* Footer strip — author on left, date on right */
        .blog-card-footer {
            padding: 0.9rem 1.4rem;
            border-top: 1px solid rgba(201, 168, 76, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-hopeforward">
        <div class="container">
            <a class="navbar-brand navbar-brand-hf" href="index.html">
                <i class="fa-solid fa-heart-pulse me-2"></i>Hope<span>Forward</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="campaigns.html">Campaigns</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link active" href="blog.html">Blog</a></li>
                </ul>
                <div class="d-flex align-items-center gap-1" id="navbar-auth"></div>
            </div>
        </div>
    </nav>

    <div class="page-header-banner">
        <div class="container">
            <span class="section-eyebrow">Stories &amp; Updates</span>
            <h1>Our Blog</h1>
            <p>Insights, impact stories, and updates from the HopeForward team and the communities we serve.</p>
        </div>
    </div>

    <section class="section-pad">
        <div class="container">
            <div class="row g-4" id="blogList"></div>
            <div id="blogEmpty" style="display:none;" class="text-center py-5">
                <div style="font-size:3rem;margin-bottom:1rem;color:var(--text-muted);">✍️</div>
                <h5>No Posts Yet</h5>
                <p class="text-muted">Our writers are crafting stories — come back soon!</p>
            </div>
        </div>
    </section>

    <footer class="footer-hf">
        <div class="container">
            <div class="footer-bottom">&copy; <span id="footerYear"></span> HopeForward Charity Foundation.</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        const postIcons = ['📝', '💡', '🌍', '🤝', '❤️', '🌟', '🌱', '🎯'];
        const postLabels = ['Foundation Update', 'Impact Story', 'Community', 'Education', 'Health', 'Environment', 'Volunteering', 'Fundraising'];

        function render() {
            const blogs = HF.getBlogs();
            const list = document.getElementById('blogList');
            const empty = document.getElementById('blogEmpty');
            if (!blogs.length) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            list.innerHTML = blogs.map((b, i) => `
      <div class="col-lg-4 col-md-6 reveal">
        <div class="blog-card">
          <div class="blog-card-img-placeholder">${postIcons[i % postIcons.length]}</div>
          <div class="blog-card-body">
            <div class="blog-category-tag"><i class="fa-solid fa-tag me-1"></i>${postLabels[i % postLabels.length]}</div>
            <h5>${escHtml(b.title)}</h5>
            <p>${escHtml(b.content?.slice(0, 160))}${b.content?.length > 160 ? '…' : ''}</p>
          </div>
          <div class="blog-card-footer">
            <span><i class="fa-solid fa-user-pen me-1"></i>${escHtml(b.adminEmail || 'Admin')}</span>
            <span><i class="fa-regular fa-calendar me-1"></i>${new Date(b.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
          </div>
        </div>
      </div>`
            ).join('');
        }

        render();

        function escHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
    </script>
</body>

</html>
